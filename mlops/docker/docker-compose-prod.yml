version: '3.8'

services:
  chatbot:
    image: gishb/union-chatbot:latest
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    expose:
      - "32000"
    env_file:
      - /opt/unionchatbot/.env.prod
    networks:
      - app-network

  redis:
    image: redis:latest
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    expose:
      - "6379"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  chromadb:
    image: chromadb/chroma:1.5.2
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - chroma_data:/data
    networks:
      - app-network

  nginx:
    image: nginx:1.23-alpine
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1.0'    # Максимум 1 ядро
          memory: '512M'  # Жёсткий лимит памяти
        reservations:
          cpus: '0.2'     # Гарантированные 20% CPU
          memory: '256M'  # Минимум памяти
    ports:
      - "443:443"  # HTTPS
      - "80:80" # HTTP
    volumes:
      # Основные конфиги
      - /etc/nginx/nginx.conf:/etc/nginx/nginx.conf  # Главный конфиг
      - /etc/nginx/conf.d:/etc/nginx/conf.d          # Доп. конфиги (app.conf)

      # SSL и токены
      - /etc/letsencrypt/live/profkom-chatbot.ru/fullchain.pem:/etc/letsencrypt/live/profkom-chatbot.ru/fullchain.pem
      - /etc/letsencrypt/live/profkom-chatbot.ru/privkey.pem:/etc/letsencrypt/live/profkom-chatbot.ru/privkey.pem
      - /etc/nginx/tokens:/etc/nginx/tokens  # Файлы с токенами

      # Логи
      - /etc/nginx/logs:/var/log/nginx               # Логи access/error
    depends_on:
      - chatbot
      - redis
      - chromadb
    networks:
      - app-network

volumes:
  redis_data:
  chroma_data:

networks:
  app-network:
    driver: bridge